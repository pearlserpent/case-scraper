name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Verify Tailscale connection
        run: |
          tailscale status
          tailscale ip -4

      - name: Deploy to OCI
        run: |
          ssh -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.TAILSCALE_IP }} \
              'cd ~/case-scraper && git pull && uv sync --no-dev && sudo systemctl restart case-scraper'

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.TAILSCALE_IP }} \
              'sudo systemctl is-active case-scraper && curl -sf http://localhost:8001/health'